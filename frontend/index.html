<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fashion Shop</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/pages/product-modal.css">
  <link rel="stylesheet" href="./css/components/cart.css">
  <link rel="stylesheet" href="./css/pages/home.css">
  <link rel="stylesheet" href="./css/components/footer.css">
  <link rel="stylesheet" href="./css/components/toast.css">
  <link rel="stylesheet" href="./css/pages/register.css">
  <link rel="stylesheet" href="./css/pages/login.css">
  <link rel="stylesheet" href="./css/pages/shirts.css">
  <link rel="stylesheet" href="./css/pages/product-detail.css">
  <link rel="stylesheet" href="./css/pages/pants.css">

</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- MAIN CONTENT -->
  <main id="app"></main>

  <!-- MODAL -->
  <div class="product-modal" id="productModal">
    <div class="modal-overlay"></div>

    <div class="modal-content">
      
      <div class="modal-left">
        <div class="thumbs" id="modal-thumbs"></div>
        <div class="main-image">
           <img id="modal-main-img" />
        </div>
      </div>

      <div class="modal-right">
        <button class="close-modal" id="closeModal"> ✕ </button>

        <h3 id="modal-name"></h3>
        <p class="status">Còn hàng</p>
        <p class="price" id="modal-price"></p>

        <h4>MÀU SẮC</h4>
        <div id="modal-colors"></div>

        <h4>KÍCH THƯỚC</h4>
        <div class="sizes">
          <span>M</span>
          <span>L</span>
          <span>XL</span>
          <span>2XL</span>
        </div>

        <button class="buy-btn">SỞ HỮU NGAY</button>
      </div>

    </div>
  </div>

  <!-- Sidebar Cart-->
  <div class="cart-sidebar" id="cartSidebar">
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-content">
    <div class="cart-header">

      <h3>GIỎ HÀNG</h3>
      <button id="closeCart"> ✕ </button>
    </div>
    <div class="cart-items" id="cartItems"></div>

    <!-- footer -->
    <div class="cart-footer">

      <div class="cart-total">

        <span>TỔNG TIỀN:</span>

        <strong id="cartTotal">
          0đ
        </strong>

      </div>

      <button class="checkout-btn">
        TIẾN HÀNH ĐẶT HÀNG
      </button>
    </div>
   </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script type="module" src="./js/main.js"></script>

</body>
</html>
