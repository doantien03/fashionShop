<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fashion Shop</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/pages/product-modal.css">
  <link rel="stylesheet" href="./css/components/cart.css">
  <link rel="stylesheet" href="./css/pages/home.css">
  <link rel="stylesheet" href="./css/components/footer.css">
  <link rel="stylesheet" href="./css/components/toast.css">
  <link rel="stylesheet" href="./css/pages/register.css">
  <link rel="stylesheet" href="./css/pages/login.css">
  <link rel="stylesheet" href="./css/pages/shirts.css">
  <link rel="stylesheet" href="./css/pages/product-detail.css">
  <link rel="stylesheet" href="./css/pages/pants.css">
  <link rel="stylesheet" href="./css/pages/accessory.css">
  <link rel="stylesheet" href="./css/pages/cart-page.css">
  <link rel="stylesheet" href="./css/pages/checkout.css">
  <link rel="stylesheet" href="./css/pages/news.css">
  <link rel="stylesheet" href="./css/pages/news-detail.css">
  <link rel="stylesheet" href="./css/pages/my-orders.css">
  <link rel="stylesheet" href="./css/pages/order-success.css">
  <link rel="stylesheet" href="./css/pages/order-detail.css">

</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- MAIN CONTENT -->
  <main id="app"></main>

  <!-- MODAL -->
  <div class="product-modal" id="productModal">
    <div class="modal-overlay"></div>
    
    <div class="modal-content">
      <button class="close-modal" id="closeModal"> 
      <img src="/assets/icons/x-solid.svg" alt="close"> </button>

      <div class="modal-left">
        <div class="thumbs" id="modal-thumbs"></div>
        
        <div class="main-image">
         <button class="nav-btn prev" id="prevImg">
         <img src="/assets/icons/chevron-left.svg" >
         </button>
        <img id="modal-main-img"/>
         <button class="nav-btn next" id="nextImg">
         <img src="/assets/icons/chevron-right.svg" >
         </button>
        </div>
      </div>

      <div class="modal-right">
        <h3 id="modal-name"></h3>
        <p class="status">Còn hàng</p>
        <p class="price" id="modal-price"></p>

        <h4>MÀU SẮC <span id="select-color"></span></h4>
        <div class="colors" id="modal-colors"></div>

        <h4>KÍCH THƯỚC</h4>
        <div class="sizes">
          <span>M</span>
          <span>L</span>
          <span>XL</span>
          <span>2XL</span>
        </div>

        <div class="quantity">
          <button id="modal-minus"> - </button>
          <input id="modal-qty" value ="1">
          <button id="modal-plus"> + </button>
        </div>

        <!-- thông báo lỗi -->
        <p id="product-message"></p>
        <button id="modal-add-cart" class="buy-btn">SỞ HỮU NGAY</button>
        <a id="view-detail" class="detail-link" href="#">Xem chi tiết sản phẩm</a>
      </div>

    </div>
  </div>

  <!-- Sidebar Cart-->
  <div class="cart-sidebar" id="cartSidebar">
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-content">
    <div class="cart-header">

      <h3>GIỎ HÀNG</h3>
      <button id="closeCart"> 
      <img src="/assets/icons/x-solid.svg" alt="close"> </button>
    </div>
    <div class="cart-items" id="cartItems"></div>

    <!-- footer -->
    <div class="cart-footer">

      <div class="cart-total">

        <span>TỔNG TIỀN TẠM TÍNH:</span>

        <strong id="cartTotal">
          0đ
        </strong>

      </div>

      <a href="/checkout" class="checkout-btn">
      TIẾN HÀNH ĐẶT HÀNG
      </a>
    </div>
   </div>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- JS -->
  <script type="module" src="./js/main.js"></script>

</body>
</html>
