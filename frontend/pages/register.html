<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="../css/pages/register.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/toast.css">
</head>
<body>

<!-- HEADER -->
<div id="header"></div>

<!-- LOGIN -->
<div class="register-container">

    <!-- LEFT -->
    <div class="register-left">

      <h2>Tạo tài khoản</h2>
      <input type="text" id="name" placeholder="Name">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <div class="register-options">
        <div class="term">
          <input type="checkbox" id="accept">
          <label for="accept">Tôi chấp thuận các điều khoản và dịch vụ.</label>
        </div>
      </div>

      <button id="signupleft">Đăng ký</button>
    </div>

    <!-- RIGHT -->
    
    <div class="register-right">
      <div class="overlay">
        <h2>Get Started!</h2>
        <p>Bạn đã có tài khoản?</p>
        <button class="signin" id="signinBtn">Đăng nhập</button>
      </div>
    </div>

  </div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">
    <div class="logo">Fashion<span>.</span></div>
    <p>Hello FashionShop!</p>
  </div>

  <div class="footer-center">
    <h4>COMPANY</h4>
    <a href="#">Home</a>
    <a href="#">About us</a>
    <a href="#">Delivery</a>
    <a href="#">Privacy policy</a>
  </div>

  <div class="footer-right">
    <h4>GET IN TOUCH</h4>
    <p>+84 869865313</p>
    <p>doantienle@gmail.com</p>
  </div>
</footer>

<div id="toast-container"></div>
<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/pages/register.js"></script>
</body>
</html>
