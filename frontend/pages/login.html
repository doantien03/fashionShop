<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/pages/login.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/toast.css">
</head>
<body>

<!-- đăng nhập -->
<div class="login-container">

    <!-- phần đăng nhập trái -->
    <div class="login-left">
      <h2>Đăng nhập</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <div class="login-options">
        <a href="#">Quên mật khẩu?</a>     <!-- link lấy password -->
      </div>

      <button id ="signinleft">Đăng nhập</button>
    </div>

    <!-- đăng nhập bên phải -->
    
    <div class="login-right">
      <div class="overlay">
        <h2>Welcome <br> Back!</h2>
        <p>Vui lòng nhập thông tin của bạn!</p>
        <p>Bạn chưa có tài khoản?</p>
        <button class="signup" id="signupBtn">Đăng Ký</button>
      </div>
    </div>

  </div>

<div id="toast-container"></div>
<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/pages/login.js"></script>
</body>


</html>
