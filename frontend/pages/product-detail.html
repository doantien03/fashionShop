<div class="product-detail">

  <!-- Trái: thumbnails -->
  <div class="thumbs" id="thumbs"></div>

  <!-- Giữa: ảnh chính -->
  <div class="main-image">
  <button class="nav-btn prev" id="prevImg">
  <img src="../assets/icons/chevron-left.svg" />
  </button>
    <img id="main-image" src=""
         alt="Ảnh sản phẩm" />
  <button class="nav-btn next" id="nextImg">
  <img src="../assets/icons/chevron-right.svg" />
  </button>
  </div>

  <!-- Phải: thông tin sản phẩm -->
  <div class="info">
    <h2 id="name"></h2>
    <p class="status">Còn hàng</p>
    <p class="price" id="price"> </p>
    <h4> MÀU SẮC <span id="select-color"></span> </h4> <!-- Màu -->
    <div class="colors" id="colors"></div> 

    <div id="size-wrapper">  <!-- Kích thước -->
    <h4>KÍCH THƯỚC</h4>
    <div class="sizes"></div>
    </div>

    <div class="quantity">  <!-- Số lượng -->
      <button id="minus"> - </button>
      <input id="qty" value="1" />
      <button id="plus"> + </button>
    </div>
    
    <p id="product-message" class="product-message"></p> <!-- Thông báo khi chọn thiếu màu or size -->
    <div class="actions">
      <button class="add-cart" id="add-cart">THÊM VÀO GIỎ HÀNG</button>
      <button class="buy-now">MUA NGAY</button>
    </div>
  </div>

  <div class="shipping-info">
       <div class="shipping-item">
          <div class="shipping-icon">🚚</div>

          <div class="shipping-content">
            <h4>Miễn phí vận chuyển</h4>
            <p>Cho đơn hàng từ <strong>499.000đ</strong> trên toàn quốc.</p>
          </div>
       </div>

    <div class="shipping-item">
       <div class="shipping-icon">🔄</div>

       <div class="shipping-content">
          <h4>Đổi trả dễ dàng</h4>
          <p>Hỗ trợ đổi trả trong vòng <strong>7 ngày</strong> nếu sản phẩm còn nguyên tem.</p>
       </div>
    </div>

    <div class="shipping-item">
       <div class="shipping-icon">✔</div>

       <div class="shipping-content">
         <h4>Cam kết chính hãng</h4>
         <p>100% sản phẩm chính hãng, hoàn tiền nếu phát hiện hàng giả.</p>
       </div>
    </div>
   </div>
</div>
