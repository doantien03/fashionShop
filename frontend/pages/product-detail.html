<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products-detail</title>
  <link rel="stylesheet" href="../css/pages/product-detail.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/footer.css">
</head>
<body>

<div id="header"></div>

<div class="product-detail">

  <!-- LEFT: thumbnails -->
  <div class="thumbs" id="thumbs"></div>

  <!-- CENTER: main image -->
  <div class="main-image">
    <img id="main-img" src="" />
  </div>

  <!-- RIGHT: info -->
  <div class="info">
    <h2 id="name"></h2>
    <p class="status">Còn hàng</p>
    <p class="price" id="price"></p>

    <!-- COLORS -->
    <h4> MÀU SẮC <span id="select-color"></span> </h4>
    <div class="colors" id="colors"></div>

    <!-- SIZE -->
    <h4>KÍCH THƯỚC</h4>
    <div class="sizes">
      <span>2XL</span>
      <span>XL</span>
      <span>L</span>
      <span>M</span>
    </div>

    <!-- QUANTITY -->
    <div class="quantity">
      <button id="minus">-</button>
      <input id="qty" value="1" />
      <button id="plus">+</button>
    </div>

    <!-- BUTTON -->
    <div class="actions">
      <button class="add-cart" id="add-cart">THÊM VÀO GIỎ HÀNG</button>
      <button class="buy-now">MUA NGAY</button>
    </div>

  </div>

</div>

<!-- cuối trang -->
<div id="footer"></div>

<script type="module" src="../js/main.js"></script>
<script type="module" src="../js/pages/product-detail.js"></script>

</body>
</html>
