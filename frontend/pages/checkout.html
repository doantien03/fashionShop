<main class="checkout-page">

  <!-- LEFT -->
  <section class="checkout-left">

    <div class="checkout-breadcrumb">
      <a href="/cart">Giỏ hàng</a>
      <span> › </span>
      <span>Thanh toán</span>
    </div>

    <h2 class="checkout-title">
      Thông tin giao hàng
    </h2>

    <form class="checkout-form">

      <input
        id="customerName"
        type="text"
        placeholder="Họ tên"
      />

      <div class="checkout-row">

        <input
          id="email"
          type="email"
          placeholder="Email"
        />

        <input
          id="phone"
          type="text"
          placeholder="Số điện thoại"
        />

      </div>

      <input
        id="address"
        type="text"
        placeholder="Địa chỉ"
      />

      <div class="checkout-row">

        <input
          id="city"
          type="text"
          placeholder="Tỉnh / Thành phố"
        />

        <input
          id="district"
          type="text"
          placeholder="Quận / Huyện"
        />

      </div>

      <input
        id="ward"
        type="text"
        placeholder="Phường / Xã"
      />

      <textarea
        id="note"
        placeholder="Ghi chú"
      ></textarea>

      <select id="paymentMethod">

        <option value="COD">
          Thanh toán khi nhận hàng
        </option>

        <option value="MOMO">
          MOMO
        </option>

        <option value="VNPAY">
          VNPAY
        </option>

      </select>

    </form>

  </section>


  <!-- RIGHT -->
  <aside class="checkout-right">

    <div id="checkout-products"></div>

    <div class="checkout-summary">

      <div class="summary-row">
        <span>Tạm tính</span>

        <strong id="checkout-subtotal">
          0đ
        </strong>
      </div>

      <div class="summary-row">
        <span>Phí vận chuyển</span>
        <strong>0đ</strong>
      </div>

      <div class="summary-row total">

        <span>Tổng cộng</span>

        <strong id="checkout-total">
          0đ
        </strong>

      </div>

      <button
        id="placeOrderBtn"
        class="checkout-order-btn">

        ĐẶT HÀNG

      </button>

    </div>

  </aside>

</main>

<div id="toast-container"></div>
